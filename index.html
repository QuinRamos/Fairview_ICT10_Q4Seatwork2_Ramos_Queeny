<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Seatwork 2</title>

    <style>

        body {
            background-color: #8e776c;
            margin: auto;
            font-weight: bold;
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            justify-content: center;
            padding: 150px 0;
            margin: 0;
            align-items: center;

        }

        .container {
            background-color: #f0c0ce;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 10px rgb(168, 146, 157);
            text-align: center;
            max-width: 500px;
        }

        .btn-default {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #94727d;
            cursor: pointer;
            margin: 5px;
        }

        .btn-default:hover {
            background-color: #94727d;
        }

        #output {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff;
            border-radius: 8px;
        }

    </style>
</head>
<body>

<!-- Form -->

<div class="container"> 
    <div class="form-group"> 

        <!-- Header -->
        <h1>10-Ruby Classmates System</h1>
        <h2>♥︎</h2>

        <!-- Name -->
        <label for="name">Name:</label> 
        <input type="text" id="name" class="form-control" placeholder="Enter your Name...">
        <br>

        <!-- Section -->
        <label for="section">Section:</label>
        <input type="text" id="section" class="form-control" placeholder="Enter your Section..."> 
        <br>

        <!-- Favorite Subject -->
        <label for="favorite_subject">Favorite Subject:</label>
        <input type="text" id="favorite_subject" class="form-control" placeholder="Enter your Favorite Subject...">   
    </div>
    <br> 

    <!-- Buttons -->
    <button py-click="add_classmate" class="btn btn-default" id="add_classmate">Add Classmate</button> 
    <button py-click="show_list" class="btn btn-default" id="show_list">Show Classmate List</button> 
    
    <div style="margin-top:10px">
        <p id="output"></p>
    </div>
</div>

<!-- Python -->
<script type="py" src="main.py"></script>

</body>
</html>
